name: Build SeedSigner MicroPython Firmware

on:
  workflow_dispatch:
    inputs:
      builder_ref:
        description: "Branch/tag/SHA of seedsigner-micropython-builder to run"
        required: false
        default: "main"
      c_modules_ref:
        description: "Branch/tag/SHA for seedsigner-c-modules"
        required: false
        default: "master"
  push:
    branches: [ main ]
  pull_request:

jobs:
  resolve-image-owner:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Lowercase GHCR owner
        id: owner
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  firmware:
    needs: resolve-image-owner
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      IDF_PATH: /opt/toolchains/esp-idf
      IDF_DIR: /opt/toolchains/esp-idf
      IDF_TOOLS_PATH: /opt/espressif
      IDF_TOOLS_TARGETS: esp32s3
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
    container:
      image: ghcr.io/${{ needs.resolve-image-owner.outputs.owner_lc }}/seedsigner-micropython-builder-base:latest
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}

      - name: Prepare sources workspace from prebaked image
        run: |
          mkdir -p sources
          ./scripts/prepare_sources_from_image.sh "$PWD/sources"

      - name: Clone custom c modules and checkout selected ref
        run: |
          git clone https://github.com/kdmukAI-bot/seedsigner-c-modules.git sources/seedsigner-c-modules
          cd sources/seedsigner-c-modules
          git checkout "${{ github.event_name == 'workflow_dispatch' && inputs.c_modules_ref || 'master' }}"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ hashFiles('Dockerfile.ghcr', '.github/workflows/build-firmware.yml', 'scripts/build_firmware.sh', 'platform_mods/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Ensure ESP-IDF tools environment
        run: |
          echo "Using IDF_TOOLS_PATH=$IDF_TOOLS_PATH"
          mkdir -p "$IDF_TOOLS_PATH"
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=1G
          ccache --zero-stats || true
          source /opt/toolchains/esp-idf/export.sh
          if [ "$IDF_PATH" != "/opt/toolchains/esp-idf" ]; then
            echo "ERROR: IDF_PATH drift detected ($IDF_PATH)"
            exit 1
          fi
          idf.py --version >/dev/null 2>&1 || {
            echo "ERROR: idf.py is not runnable after ESP-IDF environment bootstrap"
            exit 1
          }

      - name: Show ccache stats (pre-build)
        run: ccache --show-stats || true

      - name: Build firmware
        run: |
          ./scripts/ci_build.sh "$PWD/sources"

      - name: Show ccache stats (post-build)
        run: ccache --show-stats || true

      - name: Record build provenance
        run: |
          mkdir -p logs
          IDF_VERSION=""
          CCACHE_SUMMARY=""
          if source "$IDF_PATH/export.sh" >/dev/null 2>&1; then
            IDF_VERSION="$(idf.py --version 2>/dev/null || true)"
          fi
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats > logs/ccache-stats.txt 2>/dev/null || true
            CCACHE_SUMMARY="$(ccache --show-stats 2>/dev/null | tr '\n' '; ' || true)"
          fi
          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "builder_ref=${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}"
            echo "c_modules_ref_input=${{ github.event_name == 'workflow_dispatch' && inputs.c_modules_ref || 'master' }}"
            echo "micropython_head=$(git -C sources/micropython rev-parse HEAD)"
            echo "c_modules_head=$(git -C sources/seedsigner-c-modules rev-parse HEAD)"
            echo "idf_head=$(git -C "$IDF_PATH" rev-parse HEAD)"
            echo "idf_version=${IDF_VERSION}"
            echo "ccache_summary=${CCACHE_SUMMARY}"
            echo "python=$(python3 --version 2>&1)"
            echo "cmake=$(cmake --version | head -n1)"
          } | tee logs/provenance.txt

      - name: Collect firmware artifacts
        run: |
          BOARD=WAVESHARE_ESP32_S3_TOUCH_LCD_35B
          BUILD_DIR="$PWD/build/$BOARD"
          mkdir -p out/firmware out/logs
          cp "$BUILD_DIR/micropython.bin" out/firmware/
          cp "$BUILD_DIR/micropython.elf" out/firmware/
          cp "$BUILD_DIR/flash_args" out/firmware/
          cp "$BUILD_DIR/bootloader/bootloader.bin" out/firmware/
          cp "$BUILD_DIR/partition_table/partition-table.bin" out/firmware/
          cp -r logs/* out/logs/ 2>/dev/null || true
          cp logs/provenance.txt out/logs/ 2>/dev/null || true

      - name: Collect LVGL source artifact
        run: |
          BOARD=WAVESHARE_ESP32_S3_TOUCH_LCD_35B
          LVGL_DIR="$PWD/build/$BOARD/managed_components/lvgl__lvgl"
          mkdir -p out/lvgl
          if [ -d "$LVGL_DIR" ]; then
            cp -r "$LVGL_DIR" out/lvgl/
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-waveshare-esp32-s3
          path: |
            out/firmware/
            out/logs/

      - name: Upload LVGL source artifact
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-source-waveshare-esp32-s3
          path: out/lvgl/
          if-no-files-found: warn

  screenshots:
    needs:
      - resolve-image-owner
      - firmware
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    container:
      image: ghcr.io/${{ needs.resolve-image-owner.outputs.owner_lc }}/seedsigner-micropython-builder-base:latest
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.builder_ref || github.ref }}

      - name: Prepare sources workspace from prebaked image
        run: |
          mkdir -p sources
          ./scripts/prepare_sources_from_image.sh "$PWD/sources"

      - name: Clone custom c modules and checkout selected ref
        run: |
          git clone https://github.com/kdmukAI-bot/seedsigner-c-modules.git sources/seedsigner-c-modules
          cd sources/seedsigner-c-modules
          git checkout "${{ github.event_name == 'workflow_dispatch' && inputs.c_modules_ref || 'master' }}"

      - name: Download LVGL source artifact
        uses: actions/download-artifact@v4
        with:
          name: lvgl-source-waveshare-esp32-s3
          path: build/WAVESHARE_ESP32_S3_TOUCH_LCD_35B/managed_components/

      - name: Build screenshots
        run: |
          ./scripts/run_screenshot_generator.sh "$PWD/sources"

      - name: Collect screenshot artifacts
        run: |
          mkdir -p out/screenshots
          cp -r "$PWD/sources/seedsigner-c-modules/tests/screenshot_generator/screenshots" out/screenshots/

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-waveshare-esp32-s3
          path: out/screenshots/
